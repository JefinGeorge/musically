name: Publish to npm

on:
  release:
    types: [published]   # publishes when you create a GitHub Release
  workflow_dispatch:      # ...or run it manually from the Actions tab

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write     # REQUIRED for npm trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Node 24 bundles npm >= 11.5.1 (required for OIDC trusted publishing). We deliberately do
          # NOT `npm install -g npm@latest` — that in-place self-upgrade corrupts the toolcache npm
          # and breaks provenance with "Cannot find module 'sigstore'".
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Show npm version (must be >= 11.5.1 for trusted publishing)
        run: npm -v

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Test
        run: npm test --if-present

      - name: Publish
        run: npm publish --access public
